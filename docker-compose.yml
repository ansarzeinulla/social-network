services:
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    ports:
      - "8080:8080" # exposed for direct access during dev (curl, tests)
    volumes:
      # Runtime data only — DB file and uploaded images. Source code stays
      # baked into the image. Named volume = no bind-mount perms issues
      # on a fresh `git clone`.
      - backend_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
        NEXT_PUBLIC_USE_MOCK_FOLLOWERS: "false"
        NEXT_PUBLIC_USE_MOCK_PROFILE: "false"
        NEXT_PUBLIC_USE_MOCK_NOTIFICATIONS: "false"
        NEXT_PUBLIC_USE_MOCK_COMMENTS: "false"
        NEXT_PUBLIC_USE_MOCK_CHAT: "false"
        NEXT_PUBLIC_USE_MOCK_GROUPS: "false"
    expose:
      - "3000"
    ports:
      - "3000:3000" # exposed for direct dev access
    depends_on:
      - backend
    environment:
      # Default compose uses two containers (backend + frontend), so the
      # browser calls the backend directly with CORS + credentials.
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_USE_MOCK_FOLLOWERS=false
      - NEXT_PUBLIC_USE_MOCK_PROFILE=false
      - NEXT_PUBLIC_USE_MOCK_NOTIFICATIONS=false
      - NEXT_PUBLIC_USE_MOCK_COMMENTS=false
      - NEXT_PUBLIC_USE_MOCK_CHAT=false
      - NEXT_PUBLIC_USE_MOCK_GROUPS=false
    restart: always

volumes:
  caddy_data:
  caddy_config:
  backend_data:
